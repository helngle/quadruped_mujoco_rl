model_path: assets/robots/unitree_go2/scene.xml
episode_length: 1000
control_timestep: 0.02
initial_keyframe: home
initial_base_height: 0.27
foot_geom_names:
  - FL
  - FR
  - RL
  - RR
ground_geom_name: floor
default_joint_qpos:
  - 0.0
  - 0.9
  - -1.8
  - 0.0
  - 0.9
  - -1.8
  - 0.0
  - 0.9
  - -1.8
  - 0.0
  - 0.9
  - -1.8

action:
  type: pd_position
  scale: 0.35
  kp: 35.0
  kd: 1.0

gait:
  enabled: true
  period: 0.5

command:
  enabled: true
  resample_time: 4.0
  vx_range: [0.3, 1.2]
  yaw_rate_range: [-0.8, 0.8]
  stand_probability: 0.15
  turn_probability: 0.15
  straight_probability: 0.25

reward:
  forward_velocity: 0.0
  forward_velocity_tracking: 2.0
  velocity_tracking_sigma: 0.5
  yaw_rate_tracking: 1.0
  yaw_rate_tracking_sigma: 0.4
  upright: 0.5
  energy_penalty: 0.0005
  action_smoothness: 0.03
  lateral_velocity_penalty: 0.4
  joint_velocity_penalty: 0.0005
  joint_posture_penalty: 0.02
  body_angular_velocity_penalty: 0.02
  pitch_target: 0.0
  pitch_penalty: 0.8
  foot_slip_penalty: 0.03
  gait_contact_reward: 0.4
  ctrl_effort_penalty: 0.0002
  base_height_target: 0.27
  base_height_tracking: 0.4
  base_height_tracking_sigma: 0.035
  base_height_penalty: 4.0
  fall_penalty: 5.0

termination:
  min_base_height: 0.16
  max_roll_pitch: 0.9
