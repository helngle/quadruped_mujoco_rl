seed: 42
total_timesteps: 1000000
log_dir: runs/ppo

env:
  id: QuadrupedFlat-v0
  config: configs/env_flat.yaml
  num_envs: 1

ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
